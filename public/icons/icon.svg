<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>FreeCalcs icon</title>
  <desc>Navy rounded square mark with a white checkmark and a blue calculator button grid, matching the live site's nav and accent colors</desc>

  <!-- background: matches nav bar #1e3a5f -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#1E3A5F"/>

  <!-- checkmark, white -->
  <polyline points="120,262 206,340 372,150"
    fill="none" stroke="#FFFFFF" stroke-width="46"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- calculator button grid: matches "free" badge accent #2563eb -->
  <rect x="272" y="330" width="80" height="80" rx="18" fill="#2563EB"/>
  <rect x="368" y="330" width="80" height="80" rx="18" fill="#2563EB"/>
</svg>
